name: Hourly Lego Deal Check

on:
  schedule:
    # This runs at the start of every hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # If you don't have a requirements file, 
          # add: pip install requests beautifulsoup4

      - name: Run Scraper and Post to Social Media
        # env:
          # Securely store your keys in GitHub Settings > Secrets
          # AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          # FACEBOOK_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          # IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: python your_scraper_script.py
