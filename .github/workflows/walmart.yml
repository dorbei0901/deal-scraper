name: Daily Lego Deal Check (Walmart)

on:
  schedule:
    # Runs at minute 33 past 16:00 UTC (8:33 AM PST) every day
    - cron: '33 16 * * *'
  workflow_dispatch:

# Fixes the Node 20 deprecation warning globally
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

# Updated from v4 to v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install --upgrade pip setuptools wheel
          pip install requests beautifulsoup4

      - name: Run Scraper
        env:
          SCRAPER_API_KEYS: ${{ secrets.SCRAPER_API_KEYS }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python Github_lego_Walmart_scraper.py
